<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CryptoReward · 后台管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#070d18;--surface:#0d1526;--surface2:#111c30;
      --border:rgba(255,255,255,0.08);
      --gold:#f5b800;--gold-soft:rgba(245,184,0,0.15);--gold-glow:rgba(245,184,0,0.35);
      --cyan:#00cfff;--green:#22d48a;--red:#f87171;
      --text:#edf0f7;--muted:#6b7a9a;
      --r:'Syne',sans-serif;--b:'Noto Sans SC',sans-serif;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--b);min-height:100vh;-webkit-font-smoothing:antialiased;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,207,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,207,255,0.02) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}

    /* LOGIN */
    .login-wrap{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--bg);}
    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:340px;text-align:center;}
    .login-logo{font-family:var(--r);font-size:1.3rem;font-weight:800;margin-bottom:8px;}
    .login-logo em{color:var(--gold);font-style:normal;}
    .login-sub{font-size:0.82rem;color:var(--muted);margin-bottom:28px;}
    .login-input{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.9rem;font-family:var(--b);outline:none;margin-bottom:14px;transition:border-color .2s;}
    .login-input:focus{border-color:var(--gold);}
    .login-btn{width:100%;padding:14px;background:var(--gold);color:#090909;font-family:var(--r);font-weight:700;font-size:0.9rem;border:none;border-radius:10px;cursor:pointer;}
    .login-err{font-size:0.78rem;color:var(--red);margin-top:10px;display:none;}

    /* TABS */
    .tabs{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;width:fit-content;}
    .tab{padding:8px 20px;border-radius:9px;font-size:0.82rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;border:none;background:transparent;font-family:var(--b);}
    .tab.active{background:var(--gold);color:#090909;}

    /* LAYOUT */
    .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px;}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
    .header-logo{font-family:var(--r);font-size:1.2rem;font-weight:800;}
    .header-logo em{color:var(--gold);font-style:normal;}
    .header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .date-select{padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.82rem;font-family:var(--b);outline:none;cursor:pointer;}
    .refresh-btn{padding:8px 16px;background:var(--gold-soft);border:1px solid var(--gold-glow);border-radius:8px;color:var(--gold);font-size:0.8rem;font-weight:600;cursor:pointer;}
    .logout-btn{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:0.8rem;cursor:pointer;}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
    @media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;}
    .kpi-label{font-size:0.72rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}
    .kpi-val{font-family:var(--r);font-size:1.8rem;font-weight:800;letter-spacing:-0.02em;}
    .kpi-sub{font-size:0.72rem;color:var(--muted);margin-top:4px;}
    .kpi-val.gold{color:var(--gold);}.kpi-val.cyan{color:var(--cyan);}.kpi-val.green{color:var(--green);}

    /* TABLE CARD */
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px;}
    .table-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
    .table-title{font-family:var(--r);font-size:0.95rem;font-weight:700;}
    .search-input{padding:7px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.8rem;font-family:var(--b);outline:none;width:220px;}
    .search-input:focus{border-color:var(--gold);}
    .table-scroll{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;min-width:700px;}
    thead th{padding:11px 14px;text-align:left;font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
    tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:rgba(255,255,255,0.025);}
    td{padding:12px 14px;font-size:0.82rem;white-space:nowrap;}
    .td-ip{font-family:monospace;font-size:0.78rem;color:var(--cyan);}
    .td-wa{font-size:0.82rem;color:var(--green);font-weight:500;}
    .td-wa.direct{color:var(--muted);}
    .td-likes{font-family:var(--r);font-weight:700;}
    .td-pts{font-family:var(--r);font-weight:700;color:var(--gold);}
    .td-time{color:var(--muted);font-size:0.74rem;}
    .td-badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:0.68rem;font-weight:600;}
    .badge-max{background:rgba(245,184,0,0.15);color:var(--gold);border:1px solid var(--gold-glow);}
    .badge-active{background:rgba(34,212,138,0.12);color:var(--green);border:1px solid rgba(34,212,138,0.3);}
    .empty{text-align:center;padding:48px;color:var(--muted);font-size:0.88rem;}
    .loading{text-align:center;padding:48px;color:var(--muted);}

    /* CHART */
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
    .chart-title{font-family:var(--r);font-size:0.95rem;font-weight:700;margin-bottom:16px;}
    .bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px;}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .bar{width:100%;background:linear-gradient(to top,var(--gold),rgba(245,184,0,0.4));border-radius:4px 4px 0 0;min-height:3px;transition:height .5s ease;}
    .bar-label{font-size:0.6rem;color:var(--muted);}
    .bar-val{font-size:0.63rem;color:var(--gold);font-family:var(--r);font-weight:700;}

    /* PAGINATION */
    .pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border);}
    .page-info{font-size:0.78rem;color:var(--muted);}
    .page-btns{display:flex;gap:8px;}
    .page-btn{padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:0.78rem;cursor:pointer;}
    .page-btn:disabled{opacity:0.35;cursor:default;}
    .page-btn:not(:disabled):hover{border-color:var(--gold);color:var(--gold);}

    /* LINK GENERATOR TAB */
    .gen-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;}
    .gen-title{font-family:var(--r);font-size:0.95rem;font-weight:700;margin-bottom:6px;}
    .gen-desc{font-size:0.8rem;color:var(--muted);margin-bottom:20px;line-height:1.6;}
    .gen-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
    .gen-input{flex:1;min-width:200px;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.85rem;font-family:var(--b);outline:none;}
    .gen-input:focus{border-color:var(--gold);}
    .gen-btn{padding:11px 20px;background:var(--gold);color:#090909;font-family:var(--r);font-weight:700;font-size:0.85rem;border:none;border-radius:10px;cursor:pointer;white-space:nowrap;}
    .gen-btn.outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
    .gen-btn.outline:hover{border-color:var(--gold);color:var(--gold);}
    .link-list{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto;}
    .link-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;}
    .link-wa{font-size:0.78rem;color:var(--green);font-weight:600;min-width:130px;}
    .link-url{font-family:monospace;font-size:0.72rem;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .copy-btn{padding:5px 12px;background:var(--gold-soft);border:1px solid var(--gold-glow);border-radius:6px;color:var(--gold);font-size:0.72rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .copy-btn:hover{background:rgba(245,184,0,0.25);}
    .batch-area{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.82rem;font-family:monospace;outline:none;resize:vertical;min-height:100px;line-height:1.6;}
    .batch-area:focus{border-color:var(--gold);}
    .export-btn{padding:10px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.82rem;font-weight:600;cursor:pointer;}
    .export-btn:hover{border-color:var(--gold);color:var(--gold);}
    .section-divider{height:1px;background:var(--border);margin:20px 0;}
    .label{font-size:0.75rem;font-weight:600;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--gold-glow);color:var(--text);padding:10px 22px;border-radius:100px;font-size:0.82rem;z-index:500;opacity:0;white-space:nowrap;transition:all .3s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Crypto<em>Reward</em></div>
    <div class="login-sub">后台管理系统 · 请输入密码</div>
    <input class="login-input" type="password" id="pwdInput" placeholder="管理员密码" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">进入后台</button>
    <div class="login-err" id="loginErr">密码错误，请重试</div>
  </div>
</div>

<!-- MAIN -->
<div class="wrap" id="mainWrap" style="display:none;">
  <div class="header">
    <div class="header-logo">Crypto<em>Reward</em> <span style="font-size:0.7rem;color:var(--muted);font-family:var(--b);font-weight:400;">后台管理</span></div>
    <div class="header-right">
      <input type="date" class="date-select" id="dateFilter"/>
      <button class="refresh-btn" onclick="loadAll()">⟳ 刷新</button>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('stats', this)">📊 数据统计</button>
    <button class="tab" onclick="switchTab('links', this)">🔗 链接生成</button>
  </div>

  <!-- ── TAB: 数据统计 ── -->
  <div id="tabStats">
    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">总点赞数</div><div class="kpi-val gold" id="kpiLikes">—</div><div class="kpi-sub">当日累计</div></div>
      <div class="kpi"><div class="kpi-label">参与 IP 数</div><div class="kpi-val cyan" id="kpiIPs">—</div><div class="kpi-sub">独立用户</div></div>
      <div class="kpi"><div class="kpi-label">总积分</div><div class="kpi-val green" id="kpiPts">—</div><div class="kpi-sub">全部用户</div></div>
      <div class="kpi"><div class="kpi-label">满赞用户</div><div class="kpi-val" id="kpiMax">—</div><div class="kpi-sub">点赞 50 次</div></div>
    </div>

    <!-- CHART -->
    <div class="chart-card">
      <div class="chart-title">📈 近 7 天点赞趋势</div>
      <div class="bar-chart" id="barChart"><div class="loading">加载中…</div></div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-head">
        <div class="table-title">📋 用户明细记录</div>
        <input class="search-input" type="text" id="searchInput" placeholder="搜索 IP 或 WhatsApp 号…" oninput="filterTable()"/>
      </div>
      <div class="table-scroll">
        <div id="tableWrap"><div class="loading">加载中…</div></div>
      </div>
      <div class="pagination" id="pagination" style="display:none;">
        <div class="page-info" id="pageInfo"></div>
        <div class="page-btns">
          <button class="page-btn" id="prevBtn" onclick="changePage(-1)">← 上一页</button>
          <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一页 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TAB: 链接生成 ── -->
  <div id="tabLinks" style="display:none;">
    <div class="gen-card">
      <div class="gen-title">🔗 WhatsApp 唯一链接生成器</div>
      <div class="gen-desc">为每个 WhatsApp 用户生成专属链接，发送后可在后台追踪该用户的点赞记录。链接格式：<code style="color:var(--cyan);font-size:0.78rem;">https://yoursite.com/?ref=手机号</code></div>

      <!-- 单个生成 -->
      <div class="label">单个生成</div>
      <div class="gen-row">
        <input class="gen-input" type="text" id="singleBase" placeholder="你的落地页网址，例如 https://yoursite.com/"/>
        <input class="gen-input" type="text" id="singleWA" placeholder="WhatsApp 号码，例如 60123456789" style="max-width:240px;"/>
        <button class="gen-btn" onclick="genSingle()">生成链接</button>
      </div>
      <div id="singleResult" style="display:none;margin-bottom:4px;">
        <div class="link-item">
          <div class="link-wa" id="singleWALabel"></div>
          <div class="link-url" id="singleURL"></div>
          <button class="copy-btn" onclick="copyText(document.getElementById('singleURL').textContent, this)">复制</button>
        </div>
      </div>

      <div class="section-divider"></div>

      <!-- 批量生成 -->
      <div class="label">批量生成（每行一个号码）</div>
      <textarea class="batch-area" id="batchInput" placeholder="60123456789&#10;60198765432&#10;6011234567&#10;..."></textarea>
      <div class="gen-row" style="margin-top:12px;">
        <input class="gen-input" type="text" id="batchBase" placeholder="你的落地页网址"/>
        <button class="gen-btn" onclick="genBatch()">批量生成</button>
        <button class="export-btn" onclick="exportCSV()">导出 CSV</button>
      </div>
      <div id="batchResult" style="display:none;">
        <div class="label" style="margin-bottom:10px;" id="batchCount"></div>
        <div class="link-list" id="linkList"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // ⚙️  配置区
  // ============================================================
  const SUPABASE_URL      = 'https://YOUR_PROJECT.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
  const ADMIN_PASSWORD    = 'admin123';
  const TABLE = 'likes';
  // ============================================================

  const PAGE_SIZE = 20;
  let allRows = [], filteredRows = [], currentPage = 1;
  let generatedLinks = [];

  // ── LOGIN ──
  function doLogin() {
    const pwd = document.getElementById('pwdInput').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('mainWrap').style.display = 'block';
      sessionStorage.setItem('cr_admin', '1');
      initDateFilter(); loadAll();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }
  function logout() {
    sessionStorage.removeItem('cr_admin');
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('mainWrap').style.display = 'none';
  }
  if (sessionStorage.getItem('cr_admin')) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('mainWrap').style.display = 'block';
    initDateFilter(); loadAll();
  }

  function initDateFilter() {
    const el = document.getElementById('dateFilter');
    el.value = new Date().toISOString().slice(0, 10);
    el.addEventListener('change', loadAll);
  }
  function getDate() { return document.getElementById('dateFilter').value; }

  // ── TABS ──
  function switchTab(name, btn) {
    document.getElementById('tabStats').style.display = name === 'stats' ? 'block' : 'none';
    document.getElementById('tabLinks').style.display = name === 'links' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  // ── LOAD ALL ──
  async function loadAll() { await Promise.all([loadTable(), loadChart()]); }

  // ── TABLE ──
  async function loadTable() {
    document.getElementById('tableWrap').innerHTML = '<div class="loading">加载中…</div>';
    document.getElementById('pagination').style.display = 'none';
    try {
      const res = await sbFetch(`/rest/v1/${TABLE}?date=eq.${getDate()}&order=likes_count.desc&select=*`);
      allRows = await res.json();
      if (!Array.isArray(allRows)) throw new Error();
      filteredRows = [...allRows];
      currentPage = 1;
      renderKPI(allRows); renderTable();
    } catch (_) {
      document.getElementById('tableWrap').innerHTML = '<div class="empty">⚠️ 数据加载失败，请检查 Supabase 配置</div>';
    }
  }

  function renderKPI(rows) {
    const totalLikes = rows.reduce((s, r) => s + (r.likes_count || 0), 0);
    const totalPts   = rows.reduce((s, r) => s + (r.points || 0), 0);
    const maxUsers   = rows.filter(r => r.likes_count >= 50).length;
    document.getElementById('kpiLikes').textContent = totalLikes.toLocaleString();
    document.getElementById('kpiIPs').textContent   = rows.length.toLocaleString();
    document.getElementById('kpiPts').textContent   = totalPts.toLocaleString();
    document.getElementById('kpiMax').textContent   = maxUsers.toLocaleString();
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    filteredRows = q ? allRows.filter(r =>
      (r.ip || '').toLowerCase().includes(q) ||
      (r.wa_ref || '').toLowerCase().includes(q)
    ) : [...allRows];
    currentPage = 1; renderTable();
  }

  function renderTable() {
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filteredRows.slice(start, start + PAGE_SIZE);
    const total = filteredRows.length;
    if (total === 0) {
      document.getElementById('tableWrap').innerHTML = '<div class="empty">暂无数据</div>';
      document.getElementById('pagination').style.display = 'none';
      return;
    }
    let html = `<table><thead><tr>
      <th>#</th><th>WhatsApp 来源</th><th>IP 地址</th>
      <th>点赞次数</th><th>积分</th><th>状态</th><th>最后点赞时间</th>
    </tr></thead><tbody>`;
    page.forEach((r, i) => {
      const idx    = start + i + 1;
      const isMax  = (r.likes_count || 0) >= 50;
      const time   = r.last_liked_at ? new Date(r.last_liked_at).toLocaleString('zh-CN', {hour12:false}) : '—';
      const isDirect = !r.wa_ref || r.wa_ref === 'direct';
      const waDisplay = isDirect ? '直接访问' : '📱 ' + r.wa_ref;
      html += `<tr>
        <td style="color:var(--muted);font-size:0.74rem;">${idx}</td>
        <td class="td-wa ${isDirect ? 'direct' : ''}">${waDisplay}</td>
        <td class="td-ip">${r.ip || '—'}</td>
        <td class="td-likes">${r.likes_count || 0}<span style="font-size:0.68rem;color:var(--muted);"> / 50</span></td>
        <td class="td-pts">${(r.points || 0).toLocaleString()}</td>
        <td><span class="td-badge ${isMax ? 'badge-max' : 'badge-active'}">${isMax ? '满赞' : '进行中'}</span></td>
        <td class="td-time">${time}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tableWrap').innerHTML = html;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    document.getElementById('pagination').style.display = 'flex';
    document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页，共 ${total} 条`;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
  }

  function changePage(dir) { currentPage += dir; renderTable(); }

  // ── CHART ──
  async function loadChart() {
    const dates = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      dates.push(d.toISOString().slice(0, 10));
    }
    try {
      const res = await sbFetch(`/rest/v1/${TABLE}?date=gte.${dates[0]}&select=date,likes_count`);
      const rows = await res.json();
      if (!Array.isArray(rows)) throw new Error();
      const dayMap = {};
      rows.forEach(r => { dayMap[r.date] = (dayMap[r.date] || 0) + (r.likes_count || 0); });
      const vals = dates.map(d => dayMap[d] || 0);
      const maxVal = Math.max(...vals, 1);
      const chart = document.getElementById('barChart');
      chart.innerHTML = '';
      dates.forEach((d, i) => {
        const h = Math.round((vals[i] / maxVal) * 88);
        const col = document.createElement('div');
        col.className = 'bar-col';
        col.innerHTML = `<div class="bar-val">${vals[i] > 0 ? vals[i] : ''}</div><div class="bar" style="height:${h}px"></div><div class="bar-label">${d.slice(5)}</div>`;
        chart.appendChild(col);
      });
    } catch (_) {
      document.getElementById('barChart').innerHTML = '<div class="empty" style="padding:20px;">图表加载失败</div>';
    }
  }

  // ── LINK GENERATOR ──
  function buildLink(base, wa) {
    const b = base.trim().replace(/\/$/, '');
    const w = wa.trim().replace(/\s+/g, '').replace(/^\+/, '');
    return b + '/?ref=' + encodeURIComponent(w);
  }

  function genSingle() {
    const base = document.getElementById('singleBase').value;
    const wa   = document.getElementById('singleWA').value;
    if (!base || !wa) { toast('请填写网址和 WhatsApp 号码'); return; }
    const url = buildLink(base, wa);
    document.getElementById('singleWALabel').textContent = '📱 ' + wa.trim();
    document.getElementById('singleURL').textContent = url;
    document.getElementById('singleResult').style.display = 'block';
  }

  function genBatch() {
    const base  = document.getElementById('batchBase').value;
    const lines = document.getElementById('batchInput').value.split('\n').map(l => l.trim()).filter(Boolean);
    if (!base) { toast('请填写落地页网址'); return; }
    if (lines.length === 0) { toast('请输入 WhatsApp 号码列表'); return; }

    generatedLinks = lines.map(wa => ({ wa, url: buildLink(base, wa) }));
    document.getElementById('batchCount').textContent = `已生成 ${generatedLinks.length} 个链接`;

    const list = document.getElementById('linkList');
    list.innerHTML = '';
    generatedLinks.forEach(({ wa, url }) => {
      const item = document.createElement('div');
      item.className = 'link-item';
      item.innerHTML = `
        <div class="link-wa">📱 ${wa}</div>
        <div class="link-url">${url}</div>
        <button class="copy-btn" onclick="copyText('${url}', this)">复制</button>`;
      list.appendChild(item);
    });
    document.getElementById('batchResult').style.display = 'block';
  }

  function exportCSV() {
    if (generatedLinks.length === 0) { toast('请先生成链接'); return; }
    const rows = ['WhatsApp号码,专属链接', ...generatedLinks.map(l => `${l.wa},${l.url}`)];
    const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'cryptoreward_links.csv';
    a.click();
    toast('✅ CSV 已下载');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ 已复制';
      setTimeout(() => btn.textContent = orig, 1800);
    }).catch(() => toast('复制失败，请手动复制'));
  }

  // ── Supabase fetch ──
  function sbFetch(path, opts = {}) {
    return fetch(SUPABASE_URL + path, {
      ...opts,
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        ...(opts.headers || {})
      }
    });
  }

  function toast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg;
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2400);
  }
</script>
</body>
